<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Login • Smart Healthcare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --brand: #22c55e;
      --brand-2: #06b6d4;
      --accent: #a78bfa;
      --danger: #ef4444;
      --warning: #f59e0b;
      --surface: #0b1220;
      --ring: rgba(34, 197, 94, 0.35);
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 20% -10%, rgba(6, 182, 212, 0.2), transparent 60%),
                  radial-gradient(1000px 500px at 80% 10%, rgba(167, 139, 250, 0.18), transparent 60%),
                  linear-gradient(180deg, #0b1020 0%, #0a0f1b 100%);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    /* Navbar */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11, 16, 32, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; font-weight: 700;
      letter-spacing: 0.2px;
    }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: conic-gradient(from 180deg at 50% 50%, var(--brand), var(--brand-2), var(--accent), var(--brand));
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15), 0 8px 20px rgba(6,182,212,0.25);
    }
    .nav-links { display: flex; align-items: center; gap: 14px; }
    .nav-links a {
      padding: 8px 12px; border-radius: 10px; color: var(--muted);
      border: 1px solid transparent;
    }
    .nav-links a:hover {
      color: var(--text); border-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }
    .cta {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #051016; padding: 8px 14px; border-radius: 10px; font-weight: 700;
      box-shadow: 0 6px 20px rgba(34,197,94,0.35);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .cta:hover { filter: brightness(1.05); }

    /* Login Form */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }
    .login-card {
      background: radial-gradient(600px 200px at 10% 0%, rgba(6,182,212,0.15), transparent 50%),
                  linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 25px rgba(34,197,94,0.3);
    }
    .login-icon::before {
      content: "👤";
      font-size: 24px;
    }
    .login-title {
      font-size: 28px; font-weight: 700; margin: 0 0 8px;
      background: linear-gradient(135deg, #fff, #d5fbe3 35%, #b6f3ff 70%, #e6deff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .login-subtitle {
      color: var(--muted); margin: 0; font-size: 16px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block; margin-bottom: 8px; color: var(--muted);
      font-weight: 600; font-size: 14px;
    }
    .form-input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      background: rgba(15, 22, 40, 0.8); color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 16px; transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-input:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }
    .form-input::placeholder {
      color: var(--muted);
    }
    .login-button {
      width: 100%; padding: 14px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #051016; font-weight: 700; font-size: 16px;
      border: none; cursor: pointer; transition: filter 0.2s ease;
      box-shadow: 0 6px 20px rgba(34,197,94,0.35);
    }
    .login-button:hover {
      filter: brightness(1.05);
    }
    .login-button:active {
      transform: translateY(1px);
    }
    .login-footer {
      text-align: center; margin-top: 24px; color: var(--muted);
    }
    .login-footer a {
      color: var(--brand); font-weight: 600;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
    .register-link {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* Footer */
    footer {
      margin-top: auto; padding: 20px 0; color: var(--muted); font-size: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .login-card {
        margin: 0 20px; padding: 32px 24px;
      }
      .nav-inner { height: auto; padding: 12px 0; gap: 12px; flex-wrap: wrap; }
      .nav-links { width: 100%; flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner" role="navigation" aria-label="Primary">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <span>Smart Healthcare</span>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="queue.html">Queue</a>
        <a href="prescriptions.html">Prescriptions</a>
        <a href="doctors.html">Doctors</a>
        <a href="user-login.html" aria-current="page">User Login</a>
        <a href="doctor-login.html">Doctor Login</a>
        <a class="cta" href="admin-login.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon" aria-hidden="true"></div>
        <h1 class="login-title">Patient Portal</h1>
        <p class="login-subtitle">Access your appointments and prescriptions</p>
      </div>
      
      <form id="userLoginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="Enter your email address"
            required
          />
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
          />
        </div>
        
        <button type="submit" class="login-button">
          Sign In to Patient Portal
        </button>
      </form>
      
      <div class="login-footer">
        <p>Don't have an account? <a href="user-register.html">Register here</a></p>
        <div class="register-link">
          <p>Need help? <a href="mailto:support@smarthealthcare.com">Contact Support</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      © <span id="year"></span> Smart Healthcare. All rights reserved.
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    document.getElementById('userLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Basic validation
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert('Please enter a valid email address');
        return;
      }
      
      // Login via backend API
      const loginButton = document.querySelector('.login-button');
      const originalText = loginButton.textContent;
      loginButton.textContent = 'Signing In...';
      loginButton.disabled = true;
      
      // Prepare login data
      const loginData = {
        email: email.toLowerCase(),
        password: password,
        role: 'user'
      };
      
      // Call login API
      fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(loginData)
      })
      .then(response => response.json())
      .then(data => {
        if (data.message && data.message.includes('successful')) {
          // Store token and user info
          localStorage.setItem('smartHealthcareToken', data.access_token);
          localStorage.setItem('smartHealthcareUser', JSON.stringify(data.user));
          alert('Login successful! Redirecting to patient dashboard...');
          window.location.href = 'index.html';
        } else {
          alert(data.message || 'Login failed. Please check your credentials.');
          loginButton.textContent = originalText;
          loginButton.disabled = false;
        }
      })
      .catch(error => {
        console.error('Login error:', error);
        alert('Login failed. Please try again.');
        loginButton.textContent = originalText;
        loginButton.disabled = false;
      });
    });
  </script>
</body>
</html>
