<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <div class="brand"><div class="brand-mark"></div><span>Smart Healthcare</span></div>
      <nav class="nav-links">
